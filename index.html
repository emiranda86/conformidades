<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Conformidades - IP Santa Monica Fishing</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--bd:#0C3D6B;--bm:#1565A8;--bl:#E6F1FB;--bg:#F0F4F8;--gb:#C8D3DF;--gd:#0F6E56;--gl:#E1F5EE;--rd:#A32D2D;--rl:#FCEBEB;--al:#FAEEDA;--am:#633806}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:#f0f4f8;min-height:100vh;color:#1A2533}
.grad{background:linear-gradient(135deg,#0C3D6B,#1565A8)}
.center{display:flex;align-items:center;justify-content:center;padding:16px}
.fixed{position:fixed;inset:0;z-index:9999}
.box{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:380px}
.box.wide{max-width:520px}
.logo-img{height:44px;display:block;margin:0 auto 12px;object-fit:contain}
.title{font-size:16px;font-weight:600;color:#0C3D6B;text-align:center;margin-bottom:3px}
.sub{font-size:11px;color:#5A6577;text-align:center;margin-bottom:18px}
.field{margin-bottom:11px}
.field label{font-size:11px;font-weight:600;color:#5A6577;display:block;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1.5px solid #C8D3DF;border-radius:7px;font-size:14px;color:#1A2533}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#1565A8}
.field textarea{resize:vertical;line-height:1.5}
.btn{width:100%;padding:10px;background:#1565A8;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.btn:disabled{background:#aac4e0;cursor:not-allowed}
.btn.sm{width:auto;padding:5px 12px;font-size:11px;margin:1px}
.btn.gray{background:#F0F4F8;color:#1A2533;border:1px solid #C8D3DF}
.btn.red{background:#FCEBEB;color:#A32D2D;border:1px solid #F7C1C1}
.btn.green{background:#E1F5EE;color:#0F6E56;border:1px solid #9FE1CB}
.errmsg{background:#FCEBEB;color:#A32D2D;border-radius:6px;padding:7px 10px;font-size:12px;margin-top:9px;display:none}
.dots{display:flex;gap:5px;margin-bottom:14px}
.dot{height:4px;flex:1;border-radius:2px;background:#e0e0e0}
.dot.on{background:#1565A8}
.dot.done{background:#0F6E56}
.tip{background:#E6F1FB;border-radius:8px;padding:10px 12px;font-size:12px;color:#0C3D6B;margin-bottom:12px;line-height:1.6}
.tip a{color:#1565A8;font-weight:500}
.sf{margin-bottom:9px}
.sf label{font-size:11px;font-weight:600;color:#5A6577;display:block;margin-bottom:3px}
.sf input{width:100%;padding:8px 10px;border:1px solid #C8D3DF;border-radius:7px;font-size:13px}
.topbar{background:#0C3D6B;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:5px}
.tl{display:flex;align-items:center;gap:9px}
.tl img{height:27px;object-fit:contain}
.tlt{color:#fff;font-size:13px;font-weight:600}
.tls{color:#85B7EB;font-size:10px}
.tr{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.chip{background:rgba(255,255,255,0.15);color:#fff;border-radius:20px;padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:4px}
.abadge{background:#EF9F27;color:#fff;border-radius:3px;font-size:9px;padding:1px 4px;font-weight:700}
.tbtn{padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:500;border:none;background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.25)}
.panel{background:#fff;border-bottom:1px solid #C8D3DF;padding:11px 13px;display:none}
.panel.open{display:block}
.pi{max-width:820px;margin:0 auto}
.main{max-width:820px;margin:0 auto;padding:11px 10px 40px}
.stepper{display:flex;background:#fff;border-radius:10px;border:1px solid #C8D3DF;overflow:hidden;margin-bottom:10px}
.sb{flex:1;padding:7px 2px;font-size:10px;font-weight:500;border:none;border-right:1px solid #C8D3DF;cursor:pointer;background:#fff;color:#888;text-align:center}
.sb:last-child{border-right:none}
.sb.active{background:#1565A8;color:#fff}
.sb.done{background:#E1F5EE;color:#0F6E56}
.sn{font-size:13px;display:block;margin-bottom:1px}
.card{background:#fff;border-radius:10px;border:1px solid #C8D3DF;padding:14px;margin-bottom:9px}
.st{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#0C3D6B;border-bottom:2px solid #1565A8;padding-bottom:5px;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px}
.f{display:flex;flex-direction:column;gap:2px}
.f label{font-size:11px;font-weight:600;color:#5A6577}
.f input,.f select,.f textarea{font-size:13px;padding:6px 8px;border:1px solid #C8D3DF;border-radius:6px;width:100%;color:#1A2533}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:#1565A8}
.f textarea{resize:vertical;line-height:1.5}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:#0C3D6B;color:#fff;padding:5px 7px;text-align:left;font-weight:500}
.tbl td{padding:5px 7px;border-bottom:1px solid #eef0f3;vertical-align:middle}
.tbl tr:nth-child(even) td{background:#F0F4F8}
.tbl input[type=radio]{accent-color:#1565A8;cursor:pointer;width:15px;height:15px}
.sbox{background:#0C3D6B;border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:14px;margin-top:9px}
.slbl{font-size:10px;color:#85B7EB;margin-bottom:1px}
.sbg{height:8px;background:rgba(255,255,255,0.15);border-radius:5px;overflow:hidden;margin-top:3px}
.sfill{height:100%;border-radius:5px;transition:width 0.4s}
.ro{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;cursor:pointer;border:1px solid #C8D3DF;background:#fafbfc}
.rc{width:18px;height:18px;border-radius:50%;border:2px solid #aaa;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:#fff}
.stabs{display:flex;border-radius:6px;overflow:hidden;border:1px solid #C8D3DF;margin-bottom:4px;width:fit-content}
.stab{padding:3px 10px;font-size:11px;cursor:pointer;background:#f5f5f5;color:#5A6577;border:none;font-weight:500}
.stab.on{background:#1565A8;color:#fff}
.sc{width:100%;height:76px;border:2px dashed #C8D3DF;border-radius:6px;cursor:crosshair;display:block;background:#fafcff;touch-action:none}
.sc.hs{border-color:#1565A8}
.sua{border:2px dashed #C8D3DF;border-radius:6px;padding:10px;text-align:center;cursor:pointer;background:#fafcff;font-size:11px;color:#5A6577}
.slr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;font-size:11px;color:#888}
.sclr{font-size:11px;color:#E24B4A;background:none;border:none;cursor:pointer;font-weight:500}
.fg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fc{border:1px solid #C8D3DF;border-radius:8px;overflow:hidden}
.fh{background:#0C3D6B;color:#fff;padding:6px 8px;font-size:11px;font-weight:600;text-align:center}
.fs{background:#E6F1FB;color:#0C3D6B;padding:3px 6px;font-size:10px;font-style:italic;text-align:center}
.fb{padding:9px}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
.pf{background:#F0F4F8;border-radius:10px;padding:11px;text-align:center;margin-top:10px}
.pf p{font-size:12px;color:#777;margin-bottom:8px}
.badge-o{background:#E6F1FB;color:#0C3D6B;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:600}
.badge-c{background:#FCEBEB;color:#A32D2D;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:600}
.toast{position:fixed;bottom:16px;right:12px;left:12px;max-width:360px;margin:0 auto;background:#0C3D6B;color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;display:none;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,0.2)}
.toast.ok{background:#0F6E56}
.toast.err{background:#A32D2D}
.lov{position:fixed;inset:0;background:rgba(12,61,107,0.6);display:none;align-items:center;justify-content:center;z-index:9998}
.lob{background:#fff;border-radius:12px;padding:20px 26px;text-align:center;font-size:13px;color:#0C3D6B;font-weight:500}
.spin{width:28px;height:28px;border:3px solid #E6F1FB;border-top-color:#1565A8;border-radius:50%;animation:sp 0.7s linear infinite;margin:0 auto 9px}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:540px){.g2{grid-template-columns:1fr}.fg{grid-template-columns:1fr}}
</style>
</head>

// UTILS
function esc(v){return(v||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function $(id){return document.getElementById(id);}
function toast(m,t,ms){
  t=t||"ok";ms=ms||3200;
  var el=$("toast");el.textContent=m;el.className="toast "+t;el.style.display="block";
  setTimeout(function(){el.style.display="none";},ms);
}
function load(m){
  if(m){$("lmsg").textContent=m;$("lov").style.display="flex";}
  else $("lov").style.display="none";
}
function genPass(){
  var c="ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789",p="";
  for(var i=0;i<8;i++)p+=c[Math.floor(Math.random()*c.length)];
  return p;
}
function fd(d){
  if(!d)return"";
  var parts=d.split("-");
  return(parts[2]||"")+"/"+(parts[1]||"")+"/"+parts[0];
}
function calcP(){return F.evaluacion.reduce(function(s,v){return s+(parseInt(v||"0"));},0);}
function calcPct(){return Math.round(calcP()/35*100);}
function togglePanel(id){
  ["histPanel","usersPanel"].forEach(function(p){if(p!==id)$(p).classList.remove("open");});
  $(id).classList.toggle("open");
}

// FIREBASE CONFIG
function getConfig(){try{return JSON.parse(localStorage.getItem("ipsm_fb"));}catch(e){return null;}}
function saveConfig(c){localStorage.setItem("ipsm_fb",JSON.stringify(c));}
function initFB(cfg){
  if(!firebase.apps.length)firebase.initializeApp(cfg);
  auth=firebase.auth();
  db=firebase.firestore();
  auth.languageCode="es";
}
function resetConfig(){
  if(confirm("Esto borrara la configuracion y mostrara el asistente de configuracion. Continuar?")){
    localStorage.removeItem("ipsm_fb");
    location.reload();
  }
}

// SETUP WIZARD
var setupStep=1;
function showSetup(){
  $("setupScreen").style.display="flex";
  $("loginScreen").style.display="none";
  renderSetup();
}
function renderSetup(){
  ["d1","d2","d3"].forEach(function(id,i){
    $(id).className="dot "+(i+1<setupStep?"done":i+1===setupStep?"on":"");
  });
  var html="";

    html="<h2 style='font-size:15px;color:#0C3D6B;margin-bottom:8px'>Configuracion inicial (una sola vez)</h2>";

    html+="<strong>3.</strong> Ve a Authentication &gt; Get Started &gt; Email/Password &gt; <strong>Enable</strong><br/>";
    html+="<strong>4.</strong> Ve a Firestore Database &gt; Create database &gt; <strong>Start in test mode</strong><br/>";
    html+="<strong>5.</strong> Ve a Configuracion del proyecto (engranaje) &gt; General &gt; Tus apps &gt; icono Web &gt; Registra la app &gt; copia la configuracion";

    html+="<button class='btn' onclick='setupStep=2;renderSetup()'>Ya tengo la configuracion</button>";
  } else if(setupStep===2){
    html="<h2 style='font-size:15px;color:#0C3D6B;margin-bottom:8px'>Pega tu configuracion Firebase</h2>";
    html+="<div class='sf'><label>API Key</label><input id='fb1' placeholder='AIzaSy...'/></div>";
    html+="<div class='sf'><label>Auth Domain</label><input id='fb2' placeholder='tu-app.firebaseapp.com'/></div>";
    html+="<div class='sf'><label>Project ID</label><input id='fb3' placeholder='tu-app'/></div>";
    html+="<div class='sf'><label>App ID</label><input id='fb4' placeholder='1:123:web:abc...'/></div>";
    html+="<div style='display:flex;gap:8px;margin-top:6px'>";
    html+="<button class='btn gray sm' onclick='setupStep=1;renderSetup()'>Atras</button>";
    html+="<button class='btn' style='flex:1' onclick='saveSetup()'>Guardar y continuar</button>";
    html+="</div>";
  } else if(setupStep===3){
    html="<h2 style='font-size:15px;color:#0C3D6B;margin-bottom:8px'>Crear cuenta de administrador</h2>";
    html+="<p style='font-size:12px;color:#5A6577;margin-bottom:12px'>Crea la contrasena para <strong>"+ADMIN_EMAIL+"</strong></p>";

    html+="<div class='sf'><label>Confirmar contrasena</label><input type='password' id='ap2'/></div>";
    html+="<div class='errmsg' id='serr'></div>";
    html+="<button class='btn' onclick='finishSetup()' style='margin-top:4px'>Crear cuenta</button>";
  }
  $("setupContent").innerHTML=html;
}

function saveSetup(){
  var cfg={
    apiKey:$("fb1").value.trim(),
    authDomain:$("fb2").value.trim(),
    projectId:$("fb3").value.trim(),
    appId:$("fb4").value.trim(),
    storageBucket:$("fb2").value.trim().replace(".firebaseapp.com",".appspot.com"),
    messagingSenderId:"0"
  };
  if(!cfg.apiKey||!cfg.authDomain||!cfg.projectId||!cfg.appId){alert("Completa todos los campos.");return;}
  try{initFB(cfg);saveConfig(cfg);setupStep=3;renderSetup();}
  catch(e){alert("Error con Firebase: "+e.message);}
}

async function finishSetup(){
  var p1=$("ap1").value,p2=$("ap2").value;
  var se=$("serr");se.style.display="none";
  if(p1.length<6){se.textContent="Minimo 6 caracteres.";se.style.display="block";return;}
  if(p1!==p2){se.textContent="Las contrasenas no coinciden.";se.style.display="block";return;}
  load("Creando cuenta...");
  try{
    var cred=await auth.createUserWithEmailAndPassword(ADMIN_EMAIL,p1);
    await db.collection("users").doc(cred.user.uid).set({nombre:"Elvis Miranda",email:ADMIN_EMAIL,rol:"admin",createdAt:new Date()});
    load(false);
    $("setupScreen").style.display="none";
    $("loginScreen").style.display="flex";
    toast("Cuenta creada. Ya puedes iniciar sesion.","ok",4000);
  }catch(e){
    load(false);
    se.textContent="Error: "+e.message;se.style.display="block";
  }
}

// LOGIN
async function doLogin(){
  var email=$("lemail").value.trim().toLowerCase();
  var pass=$("lpass").value;
  var err=$("lerr");err.style.display="none";
  if(!email||!pass){err.textContent="Completa todos los campos.";err.style.display="block";return;}
  $("btnLogin").disabled=true;$("btnLogin").textContent="Verificando...";
  load("Iniciando sesion...");
  try{
    var cred=await auth.signInWithEmailAndPassword(email,pass);
    var doc=await db.collection("users").doc(cred.user.uid).get();
    currentUser={uid:cred.user.uid,email:email,nombre:doc.exists?doc.data().nombre:email,rol:doc.exists?doc.data().rol:"user"};
    load(false);startApp();
  }catch(e){
    load(false);
    $("btnLogin").disabled=false;$("btnLogin").textContent="Ingresar";
    var msgs={
      "auth/user-not-found":"Correo o contrasena incorrectos.",
      "auth/wrong-password":"Correo o contrasena incorrectos.",
      "auth/invalid-credential":"Correo o contrasena incorrectos.",
      "auth/invalid-email":"El correo no es valido.",
      "auth/too-many-requests":"Demasiados intentos. Espera unos minutos."
    };
    err.textContent=msgs[e.code]||("Error: "+e.message);err.style.display="block";
  }
}

function doLogout(){
  if(auth)auth.signOut();
  currentUser=null;
  $("appRoot").style.display="none";$("loginScreen").style.display="flex";
  $("lemail").value="";$("lpass").value="";
  $("btnLogin").disabled=false;$("btnLogin").textContent="Ingresar";
  $("lerr").style.display="none";
}

function startApp(){
  $("loginScreen").style.display="none";$("appRoot").style.display="block";
  $("uname").textContent=currentUser.nombre;
  if(currentUser.rol==="admin"){$("uadmin").style.display="inline";$("btnUsers").style.display="inline";}
  else{$("uadmin").style.display="none";$("btnUsers").style.display="none";}
  resetForm(true);
}

// USERS
async function loadUsersPanel(){
  var el=$("usersContent");el.innerHTML="Cargando...";
  try{
    var snap=await db.collection("users").orderBy("nombre").get();
    if(snap.empty){el.innerHTML="<p style='font-size:12px;color:#888'>Sin usuarios.</p>";return;}

      html+="<tr><td>"+esc(u.nombre)+"</td><td>"+esc(u.email)+"</td><td>"+rol+"</td><td>"+del+"</td></tr>";

function showAddUser(){$("addUserForm").style.display="block";$("nuPass").value=genPass();loadUsersPanel();}

async function createUser(){
  var nombre=$("nuNombre").value.trim();
  var email=$("nuEmail").value.trim().toLowerCase();
  var pass=$("nuPass").value.trim();
  var rol=$("nuRol").value;
  if(!nombre||!email||pass.length<6){toast("Completa todos los campos. Contrasena min 6 caracteres.","err",4000);return;}
  load("Creando usuario...");
  try{
    var secApp=firebase.apps.find(function(a){return a.name==="sec";});
    if(!secApp)secApp=firebase.initializeApp(firebase.app().options,"sec");
    var secAuth=firebase.auth(secApp);
    var cred=await secAuth.createUserWithEmailAndPassword(email,pass);
    await db.collection("users").doc(cred.user.uid).set({nombre:nombre,email:email,rol:rol,createdAt:new Date()});
    await secAuth.signOut();
    load(false);
    $("addUserForm").style.display="none";
    $("nuNombre").value="";$("nuEmail").value="";
    loadUsersPanel();
    alert("Usuario creado exitosamente.\n\nEnvia estos datos al usuario:\n\nURL: https://emiranda86.github.io/conformidades\nCorreo: "+email+"\nContrasena: "+pass);
    toast("Usuario "+nombre+" creado.","ok",4000);
  }catch(e){
    load(false);
    if(e.code==="auth/email-already-in-use")toast("Ese correo ya esta registrado.","err",4000);
    else toast("Error: "+e.message,"err",5000);
  }
}

async function delUser(btn){
  var uid=btn.getAttribute("data-uid");
  var email=btn.getAttribute("data-email");
  if(!confirm("Eliminar al usuario "+email+"?"))return;
  load("Eliminando...");
  try{
    await db.collection("users").doc(uid).delete();
    load(false);toast("Usuario eliminado.","ok");loadUsersPanel();
  }catch(e){load(false);toast("Error: "+e.message,"err");}
}

// HISTORIAL
async function loadHistorial(){
  var el=$("histContent");if(!el)return;
  el.innerHTML="<p style='font-size:12px;color:#888'>Cargando...</p>";
  try{
    var snap=await db.collection("conformidades").orderBy("n","desc").get();
    if(snap.empty){el.innerHTML="<p style='font-size:12px;color:#888'>Sin conformidades aun.</p>";return;}
    var isAdmin=currentUser&&currentUser.rol==="admin";
    var html="<div style='overflow-x:auto'><table class='tbl'><thead><tr><th>N</th><th>Fecha</th><th>Proveedor</th><th>Servicio</th><th>Puntaje</th><th>Estado</th><th>Usuario</th><th>Acciones</th></tr></thead><tbody>";
    snap.docs.forEach(function(doc){
      var h=doc.data(),id=doc.id;
      var mine=currentUser&&h.creadoPor===currentUser.email;
      var canEdit=(isAdmin||mine)&&!h.cerrada;
      var estado=h.cerrada?"<span class='badge-c'>Cerrada</span>":"<span class='badge-o'>Abierta</span>";
      var btns="";
      if(canEdit)btns+="<button class='btn sm green' data-id='"+id+"' onclick='editConf(this)'>Editar</button>";
      if(isAdmin&&!h.cerrada)btns+="<button class='btn sm red' data-id='"+id+"' onclick='closeConf(this)'>Cerrar</button>";
      btns+="<button class='btn sm' data-id='"+id+"' onclick='viewPdf(this)'>PDF</button>";
      html+="<tr>";
      html+="<td style='font-weight:600;color:#1565A8'>"+String(h.n).padStart(4,"0")+"</td>";
      html+="<td>"+esc(h.fecha)+"</td><td>"+esc(h.proveedor)+"</td><td>"+esc(h.servicio)+"</td>";
      html+="<td>"+esc(h.puntaje)+"</td><td>"+estado+"</td>";
      html+="<td>"+esc(h.creadoPor||"-")+"</td>";
      html+="<td>"+btns+"</td></tr>";
    });
    html+="</tbody></table></div>";
    el.innerHTML=html;
  }catch(e){el.innerHTML="<p style='color:red;font-size:12px'>Error: "+e.message+"</p>";}
}

async function editConf(btn){
  var id=btn.getAttribute("data-id");
  load("Cargando...");
  try{
    var doc=await db.collection("conformidades").doc(id).get();
    if(!doc.exists||doc.data().cerrada){load(false);toast("No se puede editar.","err");return;}
    Object.assign(F,JSON.parse(JSON.stringify(doc.data().data)));
    editingId=id;$("histPanel").classList.remove("open");
    step=0;renderStepper();renderStep();
    load(false);toast("Conformidad cargada para edicion.","ok");
  }catch(e){load(false);toast("Error: "+e.message,"err");}
}

async function closeConf(btn){
  var id=btn.getAttribute("data-id");
  if(!confirm("Cerrar esta conformidad definitivamente? Ya no podra editarse."))return;
  load("Cerrando...");
  try{
    await db.collection("conformidades").doc(id).update({cerrada:true});
    load(false);toast("Conformidad cerrada.","ok");loadHistorial();
  }catch(e){load(false);toast("Error: "+e.message,"err");}
}

async function viewPdf(btn){
  var id=btn.getAttribute("data-id");
  load("Preparando...");
  try{
    var doc=await db.collection("conformidades").doc(id).get();
    if(!doc.exists){load(false);return;}
    var saved=doc.data();
    var tmp=JSON.parse(JSON.stringify(F));
    Object.assign(F,JSON.parse(JSON.stringify(saved.data)));
    var html=buildPdf(saved.n,calcP(),calcPct());
    Object.assign(F,tmp);load(false);
    var w=window.open("","_blank","width=900,height=700");
    if(w){w.document.write(html);w.document.close();}
    else toast("Permite ventanas emergentes.","err");
  }catch(e){load(false);toast("Error: "+e.message,"err");}
}

// STEPPER
function renderStepper(){
  var html="";
  STEPS.forEach(function(s,i){
    var cls=i===step?"active":i<step?"done":"";
    var num=i<step?"ok":String(i+1);
    html+="<button class='sb "+cls+"' onclick='goTo("+i+")'><span class='sn'>"+num+"</span>"+s+"</button>";
  });
  $("stepper").innerHTML=html;
  $("stepInd").textContent="Paso "+(step+1)+" de "+STEPS.length;
  $("btnPrev").disabled=step===0;
  $("btnNext").style.display=step===STEPS.length-1?"none":"inline-block";
}

function goTo(i){saveStep();step=i;renderStepper();renderStep();}
function prevStep(){if(step>0){saveStep();step--;renderStepper();renderStep();}}
function nextStep(){if(step<STEPS.length-1){saveStep();step++;renderStepper();renderStep();}}

function saveStep(){
  function g(id){var e=$(id);return e?e.value:"";}
  if(step===0)["ordenServicio","fechaEjecucion","fechaSolicitud","proveedor","ruc","areaSolicitante","supervisor","tipoServicio","ubicacion","tipoComprobante","numComprobante","personal","numTecnicos","equipo","estadoFinal"].forEach(function(k){F[k]=g(k);});
  if(step===1)["alcance","materiales","incidencias"].forEach(function(k){F[k]=g(k);});
  if(step===2){for(var i=0;i<10;i++)F.checklistObs[i]=g("co"+i);}
  if(step===4){F.justificacion=g("jus");F.observaciones=g("obs");F.recomendaciones=g("rec");}
  if(step===5)["firma1Nombre","firma1Cargo","firma1Fecha","firma2Nombre","firma2Cargo","firma2Fecha","firma3Nombre","firma3Empresa","firma3Fecha"].forEach(function(k){F[k]=g(k);});
}

function fld(id,lbl,type,val,extra){
  if(type==="sel")return "<div class='f'><label>"+lbl+"</label><select id='"+id+"'>"+(extra||"")+"</select></div>";
  if(type==="ta")return "<div class='f'><label>"+lbl+"</label><textarea id='"+id+"' rows='"+(extra||4)+"'>"+esc(val)+"</textarea></div>";
  return "<div class='f'><label>"+lbl+"</label><input type='"+(type||"text")+"' id='"+id+"' value='"+esc(val)+"'/></div>";
}

function renderStep(){
  if(step===0)$("formContainer").innerHTML=rDatos();
  else if(step===1)$("formContainer").innerHTML=rDesc();
  else if(step===2)$("formContainer").innerHTML=rChk();
  else if(step===3)$("formContainer").innerHTML=rEval();
  else if(step===4)$("formContainer").innerHTML=rRecon();
  else if(step===5)$("formContainer").innerHTML=rFirmas();
  postRender();
}

function rDatos(){
  var so="<option value=''>Seleccionar...</option>";
  ["Operativo","Observado","Inoperativo"].forEach(function(v){so+="<option"+(F.estadoFinal===v?" selected":"")+">"+ v+"</option>";});
  return "<div class='card'><div class='st'>Datos Generales del Servicio</div><div class='g2'>"+
    fld("ordenServicio","N Orden de Servicio","text",F.ordenServicio)+
    fld("fechaEjecucion","Fecha de ejecucion","date",F.fechaEjecucion)+
    fld("fechaSolicitud","Fecha de solicitud","date",F.fechaSolicitud)+
    fld("proveedor","Proveedor / Contratista","text",F.proveedor)+
    fld("ruc","RUC","text",F.ruc)+
    fld("areaSolicitante","Area solicitante","text",F.areaSolicitante)+
    fld("supervisor","Supervisor responsable","text",F.supervisor)+
    fld("tipoServicio","Tipo de servicio","text",F.tipoServicio)+
    fld("ubicacion","Ubicacion / Area","text",F.ubicacion)+
    fld("tipoComprobante","Tipo de Comprobante","text",F.tipoComprobante)+
    fld("numComprobante","N Comprobante","text",F.numComprobante)+
    fld("personal","Personal participante","text",F.personal)+
    fld("numTecnicos","N de tecnicos","number",F.numTecnicos)+
    fld("equipo","Equipo / Sistema","text",F.equipo)+
    fld("estadoFinal","Estado final","sel",F.estadoFinal,so)+
    "</div></div>";
}

function rDesc(){
  return "<div class='card'><div class='st'>Descripcion del Servicio</div>"+
    fld("alcance","Alcance y detalle de actividades","ta",F.alcance,5)+
    fld("materiales","Materiales, repuestos e insumos","ta",F.materiales,4)+
    fld("incidencias","Incidencias o contingencias","ta",F.incidencias,4)+
    "</div>";
}

function rChk(){
  var rows="";
  CHKL.forEach(function(item,i){
    var cumple=F.checklist[i]==="cumple"?"checked":"";
    var nocumple=F.checklist[i]==="nocumple"?"checked":"";
    rows+="<tr><td>"+item+"</td>";
    rows+="<td style='text-align:center'><input type='radio' name='c"+i+"' "+cumple+" data-idx='"+i+"' data-val='cumple' onclick='setChk(this)'/></td>";
    rows+="<td style='text-align:center'><input type='radio' name='c"+i+"' "+nocumple+" data-idx='"+i+"' data-val='nocumple' onclick='setChk(this)'/></td>";
    rows+="<td><input type='text' id='co"+i+"' value='"+esc(F.checklistObs[i])+"' style='width:100%;font-size:11px;padding:2px 5px;border:1px solid #ddd;border-radius:4px'/></td></tr>";
  });
  return "<div class='card'><div class='st'>Checklist de Conformidad</div><div style='overflow-x:auto'><table class='tbl'><thead><tr><th style='width:50%'>Item</th><th style='width:10%;text-align:center'>Cumple</th><th style='width:12%;text-align:center'>No cumple</th><th>Obs.</th></tr></thead><tbody>"+rows+"</tbody></table></div></div>";
}
function setChk(el){
  F.checklist[parseInt(el.getAttribute("data-idx"))]=el.getAttribute("data-val");
}

function rEval(){
  var p=calcP(),pct=calcPct();
  var col=pct>=80?"#1D9E75":pct>=60?"#EF9F27":"#E24B4A";
  var cmt=pct>=80?"Excelente":pct>=60?"Aceptable":pct>=40?"Requiere mejoras":"Deficiente";
  var rows="";
  EVALL.forEach(function(ind,i){
    rows+="<tr><td>"+ind+"</td>";
    [1,2,3,4,5].forEach(function(n){
      var chk=F.evaluacion[i]===String(n)?"checked":"";
      rows+="<td><input type='radio' name='e"+i+"' "+chk+" data-idx='"+i+"' data-val='"+n+"' onclick='setEvalBtn(this)'/></td>";
    });
    rows+="</tr>";
  });
  return "<div class='card'><div class='st'>Evaluacion del Desempeno</div>"+
    "<div class='tip' style='margin-bottom:8px'>1=Deficiente 2=Regular 3=Bueno 4=Muy bueno 5=Excelente</div>"+
    "<div style='overflow-x:auto'><table class='tbl'><thead><tr><th style='text-align:left;width:55%'>Indicador</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th></tr></thead><tbody>"+rows+"</tbody></table></div>"+
    "<div class='sbox'><div><div class='slbl'>Puntaje</div><div style='font-size:24px;font-weight:700;color:#fff'>"+p+" <span style='font-size:11px;color:#85B7EB'>/35</span></div></div>"+
    "<div><div class='slbl'>Porcentaje</div><div style='font-size:24px;font-weight:700;color:"+col+"'>"+pct+"%</div></div>"+
    "<div style='flex:2'><div class='sbg'><div class='sfill' style='width:"+pct+"%;background:"+col+"'></div></div><div class='slbl' style='margin-top:3px'>"+cmt+"</div></div></div></div>";
}


function setEval(i,v){F.evaluacion[i]=v;renderStep();}

function rRecon(){
  var opts=[
    {v:"si_def",l:"SI, definitivamente",d:"Recomiendo y volveria a contratar sin reservas",c:"#0A5C45"},
    {v:"si_obs",l:"SI, con observaciones",d:"Se requieren mejoras antes de nueva contratacion",c:"#0C3D6B"},

  ];

function setReconBtn(el){

  F.recontratacion=el.getAttribute("data-val");
  renderStep();
}

function setRecon(v){saveStep();F.recontratacion=v;renderStep();}

function rFirmas(){
  var cards=[
    {t:"SUPERVISOR RESPONSABLE",s:"Area de Mantenimiento / Operaciones",nk:"firma1Nombre",ck:"firma1Cargo",fk:"firma1Fecha",lc:"Cargo",idx:0},
    {t:"JEFE DE MANTENIMIENTO",s:"Responsable de la aprobacion final",nk:"firma2Nombre",ck:"firma2Cargo",fk:"firma2Fecha",lc:"Cargo",idx:1},
    {t:"REP. DEL PROVEEDOR",s:"Contratista / Empresa ejecutora",nk:"firma3Nombre",ck:"firma3Empresa",fk:"firma3Fecha",lc:"Empresa",idx:2}
  ];
  var html="<div class='card'><div class='st'>Firmas Autorizadas</div>";
  if(editingId)html+="<div class='tip' style='background:#FAEEDA;color:#633806;margin-bottom:8px'>Editando conformidad existente. Al guardar se actualizara.</div>";
  html+="<div class='fg'>";
  cards.forEach(function(fc){
    html+="<div class='fc'><div class='fh'>"+fc.t+"</div><div class='fs'>"+fc.s+"</div><div class='fb'>";
    html+=fld(fc.nk,"Nombre","text",F[fc.nk]);
    html+=fld(fc.ck,fc.lc,"text",F[fc.ck]);
    html+=fld(fc.fk,"Fecha","date",F[fc.fk]);
    html+=rSig(fc.idx);
    html+="</div></div>";
  });
  html+="</div></div>";
  html+="<div class='pf'><p>Al guardar se asignara el N de conformidad automaticamente.</p>";
  html+="<button class='btn sm gray' style='margin-right:6px' onclick='resetForm()'>Nueva</button>";
  html+="<button class='btn' style='padding:9px 20px;font-size:13px' onclick='savePdf()'>Guardar y generar PDF</button>";
  html+="</div>";
  return html;
}

function rSig(i){
  var img=F[SK[i]];
  var drawActive=SM[i]==="draw"?"on":"";
  var imgActive=SM[i]==="img"?"on":"";
  var drawDisplay=SM[i]==="draw"?"block":"none";
  var imgDisplay=SM[i]==="img"?"block":"none";
  var hasImg=img?" hs":"";
  var html="<div>";
  html+="<div class='slr'>";
  html+="<div class='stabs'>";
  html+="<button class='stab "+drawActive+"' onclick='setSM("+i+",\"draw\")'>Dibujar</button>";
  html+="<button class='stab "+imgActive+"' onclick='setSM("+i+",\"img\")'>Imagen</button>";
  html+="</div>";
  html+="<button class='sclr' onclick='clrSig("+i+")'>Limpiar</button>";
  html+="</div>";
  html+="<div id='sda"+i+"' style='display:"+drawDisplay+"'>";
  html+="<canvas class='sc"+hasImg+"' id='sg"+i+"' width='260' height='76'></canvas>";
  html+="</div>";
  html+="<div id='sia"+i+"' style='display:"+imgDisplay+"'>";
  if(img){
    html+="<img style='max-height:76px;max-width:100%;border-radius:4px;display:block;margin:0 auto' src='"+img+"'/>";
    html+="<div style='text-align:center;margin-top:2px'>";
    html+="<button class='sclr' onclick='document.getElementById(\"sf"+i+"\").click()'>Cambiar</button>";
    html+="</div>";
  }else{
    html+="<div class='sua' onclick='document.getElementById(\"sf"+i+"\").click()'>Subir imagen de firma (JPG o PNG)</div>";
  }
  html+="<input type='file' id='sf"+i+"' accept='image/*' style='display:none' onchange='loadSigImg("+i+",this)'/>";
  html+="</div></div>";
  return html;
}

function setSM(i,m){SM[i]=m;$("sda"+i).style.display=m==="draw"?"block":"none";$("sia"+i).style.display=m==="img"?"block":"none";}

function loadSigImg(i,inp){
  if(!inp.files[0])return;
  var r=new FileReader();
  r.onload=function(ev){
    F[SK[i]]=ev.target.result;
    var area=$("sia"+i);
    var html="<img style='max-height:76px;max-width:100%;border-radius:4px;display:block;margin:0 auto' src='"+ev.target.result+"'/>";
    html+="<div style='text-align:center;margin-top:2px'>";
    html+="<button class='sclr' data-idx='"+i+"' onclick='triggerSigFile(this)'>Cambiar</button>";
    html+="</div>";
    html+="<input type='file' id='sf"+i+"' accept='image/*' style='display:none' data-idx='"+i+"' onchange='loadSigImgById(this)'/>";
    area.innerHTML=html;
  };
  r.readAsDataURL(inp.files[0]);
}
function triggerSigFile(btn){
  var i=btn.getAttribute("data-idx");
  document.getElementById("sf"+i).click();
}
function loadSigImgById(inp){
  var i=parseInt(inp.getAttribute("data-idx"));
  loadSigImg(i,inp);
}

function clrSig(i){
  F[SK[i]]=null;
  var c=$("sg"+i);
  if(c){c.getContext("2d").clearRect(0,0,c.width,c.height);c.classList.remove("hs");}
  var html="<div class='sua' data-idx='"+i+"' onclick='triggerSigFile2(this)'>Subir imagen de firma (JPG o PNG)</div>";
  html+="<input type='file' id='sf"+i+"' accept='image/*' style='display:none' data-idx='"+i+"' onchange='loadSigImgById(this)'/>";
  $("sia"+i).innerHTML=html;
}
function triggerSigFile2(el){
  var i=el.getAttribute("data-idx");
  document.getElementById("sf"+i).click();
}

function postRender(){if(step===5)for(var i=0;i<3;i++)initPad(i);}

function initPad(i){
  var c=$("sg"+i);if(!c)return;
  var ctx=c.getContext("2d");
  if(F[SK[i]]){var img=new Image();img.onload=function(){ctx.drawImage(img,0,0,c.width,c.height);};img.src=F[SK[i]];}
  var dr=false,last={x:0,y:0};
  function gp(e){
    var r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;
    if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};
    return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
  }
  c.onmousedown=c.ontouchstart=function(e){e.preventDefault();dr=true;last=gp(e);};
  c.onmousemove=c.ontouchmove=function(e){
    e.preventDefault();if(!dr)return;
    var p=gp(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);
    ctx.strokeStyle="#0C3D6B";ctx.lineWidth=2;ctx.lineCap="round";ctx.stroke();last=p;
  };
  c.onmouseup=c.ontouchend=function(){if(dr){dr=false;F[SK[i]]=c.toDataURL();c.classList.add("hs");}};
  c.onmouseleave=function(){if(dr){dr=false;F[SK[i]]=c.toDataURL();}};
}

// SAVE
async function savePdf(){
  saveStep();load("Guardando...");
  try{
    var n,ref;
    if(editingId){
      ref=db.collection("conformidades").doc(editingId);
      var ex=await ref.get();
      n=ex.data().n;
      await ref.update({
        data:JSON.parse(JSON.stringify(F)),
        proveedor:F.proveedor||"-",
        servicio:F.tipoServicio||"-",
        puntaje:calcP()+"/35 ("+calcPct()+"%)",
        editadoPor:currentUser.email,
        fechaEdit:new Date().toLocaleDateString("es-PE")
      });
    }else{
      var last=await db.collection("conformidades").orderBy("n","desc").limit(1).get();
      n=last.empty?1:last.docs[0].data().n+1;
      await db.collection("conformidades").add({
        n:n,
        fecha:new Date().toLocaleDateString("es-PE"),
        proveedor:F.proveedor||"-",
        servicio:F.tipoServicio||"-",
        puntaje:calcP()+"/35 ("+calcPct()+"%)",
        cerrada:false,
        creadoPor:currentUser.email,
        data:JSON.parse(JSON.stringify(F))
      });
    }
    load(false);editingId=null;
    toast("Conformidad N"+String(n).padStart(4,"0")+" guardada.","ok",4000);
    var html=buildPdf(n,calcP(),calcPct());
    var w=window.open("","_blank","width=900,height=700");
    if(w){w.document.write(html);w.document.close();setTimeout(function(){w.print();},700);}
    else toast("Permite ventanas emergentes para imprimir.","err");
  }catch(e){load(false);toast("Error: "+e.message,"err",5000);}
}

function resetForm(silent){
  if(!silent&&!confirm("Limpiar formulario para nueva conformidad?"))return;
  Object.keys(F).forEach(function(k){if(Array.isArray(F[k]))F[k]=F[k].map(function(){return null;});else F[k]="";});
  F.checklist=Array(10).fill(null);F.checklistObs=Array(10).fill("");F.evaluacion=Array(7).fill(null);F.recontratacion=null;
  editingId=null;step=0;renderStepper();renderStep();
}
